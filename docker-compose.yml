version: "3.9"

# ── SAP O2C Graph System — Local Dev Stack ────────────────────────────────────
#
# Services:
#   postgres  — PostgreSQL 15 with Apache AGE extension pre-installed
#   adminer   — lightweight DB admin UI (http://localhost:8080)
#
# Usage:
#   docker compose up -d
#   docker compose down           # stop (keeps volumes)
#   docker compose down -v        # stop + wipe data
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: apache/age:latest          # official AGE image — PG15 + AGE bundled
    container_name: o2c_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-o2cpassword}
      POSTGRES_DB:       ${DB_NAME:-o2c_graph}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Auto-run init SQL on first start
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: o2c_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
